<div class="login-page">
  <div class="login-card">

    <div class="login-logo">
      <img src="atletas-em-foco-lg.png" alt="Atletas em Foco" />
    </div>

    <div class="login-header">
      <h1>Bem-vindo de volta</h1>
      <p>Faça login para acessar o painel</p>
    </div>

    @if (erro) {
      <div class="alerta-erro">
        <span class="material-icons">error_outline</span>
        {{ erro }}
      </div>
    }

    <div class="form-grupo">
      <label>E-mail</label>
      <div class="input-wrapper">
        <span class="material-icons">email</span>
        <input type="email" [(ngModel)]="email" placeholder="admin@atletasemfoco.com" />
      </div>
    </div>

    <div class="form-grupo">
      <label>Senha</label>
      <div class="input-wrapper">
        <span class="material-icons">lock</span>
        <input type="password" [(ngModel)]="senha" placeholder="••••••••" />
      </div>
    </div>

    <button class="btn-entrar" (click)="entrar()" [disabled]="carregando">
      @if (carregando) {
        <span class="material-icons girando">sync</span>
        Entrando...
      } @else {
        <span class="material-icons">login</span>
        Entrar
      }
    </button>

    <p class="login-dica">
      <span class="material-icons">info</span>
      Use <strong>admin@atletasemfoco.com</strong> / <strong>admin123</strong>
    </p>

  </div>
</div>
